<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto Dünya | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ca1016; --bg: #121212; --card: #1d1d1d; --text: #a5a5a5; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* Ana Səhifə Stili */
        header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .action-row { display: flex; gap: 10px; padding: 15px; }
        .action-btn { flex: 1; background: white; color: black; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; }

        /* Wizard (Addım-addım panel) */
        .wizard-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; }
        .wizard-overlay.active { display: block; }
        
        .step { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .step.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .step-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .step-header i { font-size: 1.2rem; cursor: pointer; }

        .list-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; }
        .list-item:active { background: #333; }

        .finish-screen { text-align: center; padding-top: 100px; }
        .finish-screen i { font-size: 5rem; color: var(--red); margin-bottom: 20px; }

        /* Plus Düyməsi */
        .plus-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--red); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: none; color: white; }
    </style>
</head>
<body>

<div id="home">
    <header><span style="color:var(--red); font-weight:bold;">AVTO DÜNYA</span> <i class="fa-regular fa-bell"></i></header>
    
    <div class="action-row">
        <div class="action-btn" style="background:#f5f5f5; border:1px solid #ddd;"><i class="fa-solid fa-sliders"></i> Filtirlər</div>
        <div class="action-btn" style="background:#f5f5f5; border:1px solid #ddd;"><i class="fa-solid fa-sort"></i> Tarixə görə</div>
    </div>
    
    <button class="plus-btn" onclick="openWizard()"><i class="fa-solid fa-plus"></i></button>
</div>

<div id="wizard" class="wizard-overlay">
    
    <div class="step active" id="step1">
        <div class="step-header"><i class="fa-solid fa-xmark" onclick="closeWizard()"></i> <h2>Yeni elan</h2></div>
        <p>Kateqoriyanı seçin</p>
        <div class="list-item" onclick="nextStep(2)"><span><i class="fa-solid fa-car"></i> Minik</span> <i class="fa-solid fa-chevron-right"></i></div>
        <div class="list-item" onclick="nextStep(2)"><span><i class="fa-solid fa-truck"></i> Kommersiya</span> <i class="fa-solid fa-chevron-right"></i></div>
    </div>

    <div class="step" id="step2">
        <div class="step-header"><i class="fa-solid fa-arrow-left" onclick="prevStep(1)"></i> <h2>Markanı seçin</h2></div>
        <div class="list-item" onclick="nextStep(3)"><span>Mercedes</span></div>
        <div class="list-item" onclick="nextStep(3)"><span>BMW</span></div>
        <div class="list-item" onclick="nextStep(3)"><span>Toyota</span></div>
    </div>

    <div class="step" id="step3">
        <div class="step-header"><i class="fa-solid fa-arrow-left" onclick="prevStep(2)"></i> <h2>Modeli seçin</h2></div>
        <div class="list-item" onclick="nextStep(4)"><span>C-Class</span></div>
        <div class="list-item" onclick="nextStep(4)"><span>E-Class</span></div>
        <div class="list-item" onclick="nextStep(4)"><span>S-Class</span></div>
    </div>

    <div class="step" id="step4">
        <div class="finish-screen">
            <i class="fa-solid fa-circle-check"></i>
            <h1>Elanınız gözləmədə</h1>
            <p style="color:var(--text)">Tezliklə yoxlanılıb dərc ediləcək.</p>
            <br>
            <button onclick="closeWizard()" style="background:var(--red); color:white; border:none; padding:12px 30px; border-radius:8px; font-weight:bold;">Bağla</button>
        </div>
    </div>

</div>

<script>
    function openWizard() { document.getElementById('wizard').classList.add('active'); }
    function closeWizard() { 
        document.getElementById('wizard').classList.remove('active');
        location.reload(); // Reset üçün
    }

    function nextStep(stepNum) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + stepNum).classList.add('active');
    }

    function prevStep(stepNum) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + stepNum).classList.add('active');
    }
</script>

</body>
</html>
