<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekoş Proyekt - Tam Versiya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; transition: 0.3s; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* Səhifə idarəetməsi */
        .page { display: none; min-height: 100vh; padding: 20px; padding-bottom: 100px; }
        .page.active { display: block; }

        /* Əsas Səhifə (Home) */
        .feed { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .car-card { background: #1a1a1a; border-radius: 15px; overflow: hidden; }
        .img-area { position: relative; height: 110px; background: #333; }
        .card-info { padding: 10px; }
        .price { font-weight: bold; font-size: 16px; color: #fff; }

        /* Qeydiyyat & Təsdiq */
        .auth-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 80vh; }
        .auth-card { background: #1a1a1a; width: 100%; max-width: 380px; padding: 30px; border-radius: 25px; text-align: center; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid #333; background: #262626; color: white; outline: none; font-size: 16px;
        }
        input:focus { border-color: #E53935; }
        .btn-main { width: 100%; padding: 15px; background: #E53935; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Kabinet */
        .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; }
        .avatar { width: 50px; height: 50px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Aşağı Menyu */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; align-items: center; padding: 10px 0 25px; border-top: 1px solid #222; z-index: 100; }
        .nav-link { color: #666; text-decoration: none; font-size: 10px; text-align: center; flex: 1; cursor: pointer; }
        .nav-link.active { color: #E53935; }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 4px; }
        .add-btn { background: #E53935; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 25px; margin-top: -30px; box-shadow: 0 5px 15px rgba(229, 57, 53, 0.4); }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h2 style="margin-top: 0;">Son Elanlar</h2>
        <div class="feed">
            <div class="car-card">
                <div class="img-area"></div>
                <div class="card-info"><div class="price">15 800 ₼</div><div style="font-size:13px; color:#ccc;">BMW 328</div></div>
            </div>
            <div class="car-card">
                <div class="img-area"></div>
                <div class="card-info"><div class="price">24 500 ₼</div><div style="font-size:13px; color:#ccc;">Toyota Camry</div></div>
            </div>
        </div>
    </div>

    <div id="page-reg" class="page">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Qeydiyyat</h2>
                <p style="color:#888; font-size: 12px; margin-bottom: 20px;">Adınızı və 10 rəqəmli nömrənizi daxil edin.</p>
                <input type="text" id="user-name" placeholder="Adınız">
                <input type="tel" id="user-phone" placeholder="0501234567" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 10);">
                <button class="btn-main" onclick="sendBotOTP()">Kod Göndər</button>
            </div>
        </div>
    </div>

    <div id="page-otp" class="page">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Təsdiq Kodu</h2>
                <p style="color:#888; font-size: 13px;">WhatsApp-a gələn kodu daxil edin</p>
                <input type="number" id="otp-input" placeholder="0000" style="text-align: center; font-size: 20px; letter-spacing: 5px;">
                <button class="btn-main" onclick="verifyOTP()">Təsdiqlə</button>
            </div>
        </div>
    </div>

    <div id="page-cabinet" class="page">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <div class="avatar"><i class="fa fa-user"></i></div>
                <div style="margin-left: 15px;">
                    <div id="display-name" style="font-weight: bold; font-size: 18px;">İstifadəçi</div>
                    <div id="display-phone" style="font-size: 14px; color: #888;">(000) 000-00-00</div>
                </div>
            </div>
            <i class="fa fa-cog fa-lg"></i>
        </div>
        <div style="background: #1a1a1a; padding: 20px; border-radius: 20px; margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div><div style="color:#888; font-size:12px;">Balans</div><div style="font-size:20px; font-weight:bold;">0,00 AZN</div></div>
            <button style="background:#4A89FF; color:#fff; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">Artır</button>
        </div>
    </div>

    <nav class="nav">
        <div onclick="changeTab(this, 'page-home')" class="nav-link active"><i class="fa fa-home"></i>Əsas</div>
        <div onclick="changeTab(this, 'page-home')" class="nav-link"><i class="fa fa-heart"></i>Seçilmişlər</div>
        <div class="nav-link"><div class="add-btn">+</div><span>Yeni Elan</span></div>
        <div onclick="changeTab(this, 'page-home')" class="nav-link"><i class="fa fa-comment"></i>Mesajlar</div>
        <div onclick="changeTab(this, 'page-reg')" class="nav-link"><i class="fa fa-user"></i>Kabinet</div>
    </nav>

    <script>
        let generatedOTP = null;
        let isRegistered = false;
        
        // Səhifə dəyişmə funksiyası
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // Menyu tablarını idarə etmək
        function changeTab(element, pageId) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            element.classList.add('active');
            if(pageId === 'page-reg' && isRegistered) {
                showPage('page-cabinet');
            } else {
                showPage(pageId);
            }
        }

        // BOTA SORĞU GÖNDƏRMƏK (Əsas hissə)
        function sendBotOTP() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;

            if(name.length < 3 || phone.length !== 10) {
                alert("Zəhmət olmasa adınızı və 10 rəqəmli nömrənizi düzgün daxil edin.");
                return;
            }

            // 4 rəqəmli təsadüfi kod yarat
            generatedOTP = Math.floor(1000 + Math.random() * 9000);
            
            // BOTUN LINKI (Ngrok və ya Server linkini bura yazacaqsan)
            // Hələlik localhost:3000 olaraq qoyuram
            const botUrl = `http://localhost:3000/send-code?phone=994${phone.substring(1)}&code=${generatedOTP}`;

            console.log("Kod göndərilir: " + generatedOTP); // Test üçün konsola yazırıq

            fetch(botUrl)
                .then(res => res.json())
                .then(data => {
                    alert("Kod WhatsApp nömrənizə göndərildi!");
                    showPage('page-otp');
                })
                .catch(err => {
                    // Bot hələ hazır deyilsə belə, test üçün keçid edək
                    alert("Bot əlaqəsi qurulmadı, amma test üçün davam edirik. Kod: " + generatedOTP);
                    showPage('page-otp');
                });
        }

        // KODU YOXLAMAQ
        function verifyOTP() {
            const inputVal = document.getElementById('otp-input').value;
            if(inputVal == generatedOTP || inputVal == "1234") { // 1234 test üçün backdoor
                const name = document.getElementById('user-name').value;
                const phone = document.getElementById('user-phone').value;
                
                document.getElementById('display-name').innerText = name;
                document.getElementById('display-phone').innerText = phone;
                
                isRegistered = true;
                showPage('page-cabinet');
                
                // Menyu ikonunu aktiv et
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.querySelectorAll('.nav-link')[4].classList.add('active');
            } else {
                alert("Kod yanlışdır!");
            }
        }
    </script>
</body>
</html>
