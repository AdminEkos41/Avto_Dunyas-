<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto Dünyası | Admin Ekoş</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        header { background: #ff0000; padding: 20px; border-radius: 10px; text-align: center; }
        .form-container { background: #1a1a1a; padding: 20px; margin-top: 20px; border-radius: 10px; border: 1px dashed #ff0000; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        input { background: #222; color: white; border: 1px solid #444; }
        button { background: #ff0000; color: white; font-weight: bold; cursor: pointer; }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .car-card { background: #1e1e1e; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .car-card img { width: 100%; height: 150px; object-fit: cover; }
        .p-10 { padding: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🚗 AVTO DÜNYASI</h1>
</header>

<div class="form-container">
    <h3>📢 Yeni Elan Yerləşdir</h3>
    <input type="text" id="carModel" placeholder="Marka və Model (məs: BMW F10)">
    <input type="number" id="carYear" placeholder="İl">
    <input type="text" id="carPrice" placeholder="Qiymət (məs: 35000 AZN)">
    <input type="text" id="carImg" placeholder="Şəkil Linki (URL)">
    <button onclick="sendToBot()">Bota Göndər (Yoxlanış üçün)</button>
</div>

<div class="car-grid" id="carList">
    </div>

<script>
    // Bu funksiya məlumatları bota göndərəcək (Hələlik sadələşdirilmiş versiya)
    function sendToBot() {
        const model = document.getElementById('carModel').value;
        const img = document.getElementById('carImg').value;
        
        if(!model || !img) {
            alert("Zəhmət olmasa model və şəkil linkini yazın!");
            return;
        }
        
        alert("Məlumat Bota göndərildi! Ekoş bəy yoxladıqdan sonra paylaşılacaq.");
        // Gələcəkdə bura Termux-dakı Python botuna API sorğusu əlavə edəcəyik
    }
</script>

</body>
</html>
