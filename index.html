<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto Dünya | Detallar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ca1016; --bg: #121212; --card: #1d1d1d; --text: #a5a5a5; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }

        /* Ana Səhifə Stili */
        .car-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .car-card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .car-card img { width: 100%; height: 120px; object-fit: cover; }
        .car-info { padding: 10px; }
        .car-price { font-size: 1.1rem; font-weight: bold; }

        /* MƏLUMAT BÖLMƏSİ (Full Page Overlay) */
        .details-page { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); 
            z-index: 5000; 
            overflow-y: auto; 
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .details-header { position: sticky; top: 0; background: rgba(18, 18, 18, 0.9); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .details-header i { font-size: 1.5rem; cursor: pointer; }

        .main-img { width: 100%; height: 250px; object-fit: cover; }
        
        .details-content { padding: 20px; }
        .d-price { font-size: 1.8rem; font-weight: bold; color: white; margin-bottom: 5px; }
        .d-title { font-size: 1.2rem; margin-bottom: 15px; color: #eee; }

        /* Parametrlər Cədvəli (Şəkildəki kimi) */
        .info-grid { border-top: 1px solid #333; margin-top: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .info-label { color: var(--text); }
        .info-value { color: white; font-weight: 500; }

        /* Alt Zəng Düyməsi */
        .call-bar { 
            position: fixed; bottom: 0; width: 100%; 
            background: #181818; padding: 15px; 
            display: flex; gap: 10px; box-sizing: border-box;
            border-top: 1px solid #333;
        }
        .call-btn { 
            flex: 1; background: #28a745; color: white; 
            border: none; padding: 15px; border-radius: 10px; 
            font-weight: bold; font-size: 16px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .msg-btn { 
            background: var(--red); color: white; 
            border: none; padding: 15px; border-radius: 10px; width: 60px;
        }
    </style>
</head>
<body>

<div id="homePage">
    <div style="padding: 15px; font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #333;">Vip Elanlar</div>
    <div class="car-container">
        <div class="car-card" onclick="showDetails('Mercedes E-Class', '35 500 AZN', '2014', '2.2 L', 'Bakı')">
            <img src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=500">
            <div class="car-info">
                <div class="car-price">35 500 AZN</div>
                <div style="font-size: 14px; margin-top:5px;">Mercedes E-Class</div>
                <div style="font-size: 12px; color: gray;">2014 • 2.2 L • Bakı</div>
            </div>
        </div>
    </div>
</div>

<div id="detailsPage" class="details-page">
    <div class="details-header">
        <i class="fa-solid fa-arrow-left" onclick="closeDetails()"></i>
        <div>
            <i class="fa-regular fa-heart" style="margin-right: 15px;"></i>
            <i class="fa-solid fa-share-nodes"></i>
        </div>
    </div>

    <img src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=800" class="main-img">

    <div class="details-content">
        <div id="detPrice" class="d-price">35 500 AZN</div>
        <div id="detTitle" class="d-title">Mercedes E-Class, 2014 il</div>

        <div class="info-grid">
            <div class="info-row"><span class="info-label">Şəhər</span> <span id="detCity" class="info-value">Bakı</span></div>
            <div class="info-row"><span class="info-label">Marka</span> <span class="info-value">Mercedes</span></div>
            <div class="info-row"><span class="info-label">Buraxılış ili</span> <span id="detYear" class="info-value">2014</span></div>
            <div class="info-row"><span class="info-label">Mühərrik</span> <span id="detEngine" class="info-value">2.2 L</span></div>
            <div class="info-row"><span class="info-label">Yanacaq növü</span> <span class="info-value">Dizel</span></div>
            <div class="info-row"><span class="info-label">Sürətlər qutusu</span> <span class="info-value">Avtomat</span></div>
        </div>

        <div style="margin-top: 20px; line-height: 1.6; color: #ccc; font-size: 14px;">
            Maşın ideal vəziyyətdədir. Heç bir xərc tələb etmir. Real alıcıya endirim olacaq.
        </div>
    </div>

    <div class="call-bar">
        <button class="msg-btn"><i class="fa-regular fa-comment"></i></button>
        <button class="call-btn" onclick="window.location.href='tel:+9940000000'">
            <i class="fa-solid fa-phone"></i> Zəng et
        </button>
    </div>
</div>

<script>
    function showDetails(title, price, year, engine, city) {
        document.getElementById('detTitle').innerText = title + ", " + year + " il";
        document.getElementById('detPrice').innerText = price;
        document.getElementById('detYear').innerText = year;
        document.getElementById('detEngine').innerText = engine;
        document.getElementById('detCity').innerText = city;
        
        document.getElementById('detailsPage').style.display = 'block';
        document.body.style.overflow = 'hidden'; // Arxa fon sürüşməsin
    }

    function closeDetails() {
        document.getElementById('detailsPage').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
