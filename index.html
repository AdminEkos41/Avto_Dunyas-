<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto Dünyası | Admin Ekoş</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; padding: 20px; }
        header { background: #ff0000; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .form-container { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px dashed #ff0000; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #444; }
        button { background: #ff0000; color: white; font-weight: bold; cursor: pointer; }
        #status { color: #00ff00; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>🚗 AVTO DÜNYASI</h1>
</header>

<div class="form-container">
    <h3>📢 Elan Yerləşdir</h3>
    <input type="text" id="carModel" placeholder="Marka və Model (məs: Mercedes S500)">
    <input type="number" id="carPrice" placeholder="Qiymət (AZN)">
    
    <p>Maşın şəklini seçin:</p>
    <input type="file" id="fileInput" accept="image/*">
    
    <button onclick="uploadImage()">Elanı Paylaş</button>
    <p id="status"></p>
</div>

<script>
    async function uploadImage() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const model = document.getElementById('carModel').value;
        const price = document.getElementById('carPrice').value;

        if (fileInput.files.length === 0 || !model || !price) {
            alert("Bütün xanaları doldurun və şəkil seçin!");
            return;
        }

        status.innerText = "Şəkil yüklənir, gözləyin...";

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        // BU PULSUZ API AÇARIDIR (Nümunə üçün)
        const apiKey = "6027a0066922d4f20f016499893d5904"; 

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                const imageUrl = result.data.url;
                status.innerText = "Şəkil uğurla yükləndi!";
                
                // İndi bu məlumatları Bota göndərmək lazımdır
                console.log("Model:", model, "Qiymət:", price, "Şəkil:", imageUrl);
                alert("Elan Bota göndərildi! Yoxlanışdan sonra saytda görünəcək.");
            } else {
                status.innerText = "Yükləmə alınmadı.";
            }
        } catch (error) {
            console.error(error);
            status.innerText = "Xəta baş verdi!";
        }
    }
</script>

</body>
</html>
