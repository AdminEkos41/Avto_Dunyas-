<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto Dünya | Elan Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ca1016; --dark-bg: #121212; --card-bg: #1d1d1d; }
        body { background: var(--dark-bg); color: white; font-family: sans-serif; margin: 0; }
        
        /* Addım-Addım Pəncərəsi */
        .step-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .active-step { display: block; animation: slideIn 0.3s ease-out; }
        
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .header-step { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 1.5rem; margin-right: 15px; cursor: pointer; }
        
        /* Seçimlər Siyahısı (Şəkildəki kimi) */
        .option-list { list-style: none; padding: 0; }
        .option-item { background: var(--card-bg); padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .option-item:active { background: #333; }

        .btn-next { background: var(--main-red); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; position: fixed; bottom: 20px; left: 0; width: calc(100% - 40px); margin: 0 20px; }
        
        /* Şəkil Yükləmə Bölməsi */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .photo-slot { aspect-ratio: 1; background: #2a2a2a; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px dashed #555; position: relative; }
    </style>
</head>
<body>

<div style="padding: 20px;">
    <button onclick="startWizard()" style="background:var(--main-red); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold;">
        + YENİ ELAN YERLƏŞDİR
    </button>
</div>

<div id="step1" class="step-container">
    <div class="header-step"><i class="fa-solid fa-arrow-left back-btn" onclick="closeWizard()"></i> <h2>Markanı seçin</h2></div>
    <div class="option-list">
        <div class="option-item" onclick="nextStep(2, 'Mercedes')"><span>Mercedes</span> <i class="fa-solid fa-chevron-right"></i></div>
        <div class="option-item" onclick="nextStep(2, 'BMW')"><span>BMW</span> <i class="fa-solid fa-chevron-right"></i></div>
        <div class="option-item" onclick="nextStep(2, 'LADA')"><span>LADA (VAZ)</span> <i class="fa-solid fa-chevron-right"></i></div>
        <div class="option-item" onclick="nextStep(2, 'Hyundai')"><span>Hyundai</span> <i class="fa-solid fa-chevron-right"></i></div>
    </div>
</div>

<div id="step2" class="step-container">
    <div class="header-step"><i class="fa-solid fa-arrow-left back-btn" onclick="prevStep(1)"></i> <h2>Buraxılış ili</h2></div>
    <div class="option-list">
        <div class="option-item" onclick="nextStep(3, '2024')">2024</div>
        <div class="option-item" onclick="nextStep(3, '2023')">2023</div>
        <div class="option-item" onclick="nextStep(3, '2022')">2022</div>
    </div>
</div>

<div id="step3" class="step-container">
    <div class="header-step"><i class="fa-solid fa-arrow-left back-btn" onclick="prevStep(2)"></i> <h2>Şəkilləri əlavə et</h2></div>
    <p style="font-size: 0.8rem; color: #aaa;">Minimum 3 şəkil (Ön, Arxa, Salon)</p>
    <div class="photo-grid">
        <div class="photo-slot" onclick="document.getElementById('multiFiles').click()"><i class="fa-solid fa-camera"></i></div>
        <input type="file" id="multiFiles" hidden multiple accept="image/*" onchange="previewImages()">
    </div>
    <div id="imgStatus" style="margin-top:10px;"></div>
    <button class="btn-next" onclick="finalStep()">PAYLAŞ</button>
</div>

<script>
    let elanData = { marka: '', il: '', seher: 'Bakı', qiymet: '', sekiller: [] };

    function startWizard() { document.getElementById('step1').classList.add('active-step'); }
    function closeWizard() { document.querySelectorAll('.step-container').forEach(s => s.classList.remove('active-step')); }
    
    function nextStep(stepNum, val) {
        if(stepNum === 2) elanData.marka = val;
        if(stepNum === 3) elanData.il = val;
        
        document.querySelectorAll('.step-container').forEach(s => s.classList.remove('active-step'));
        document.getElementById('step' + stepNum).classList.add('active-step');
    }

    function prevStep(stepNum) {
        document.querySelectorAll('.step-container').forEach(s => s.classList.remove('active-step'));
        document.getElementById('step' + stepNum).classList.add('active-step');
    }

    async function previewImages() {
        const files = document.getElementById('multiFiles').files;
        const status = document.getElementById('imgStatus');
        status.innerText = files.length + " şəkil seçildi (Maks. 41)";
    }

    function finalStep() {
        alert("⛩️ Təbriklər Ekoş! Elan bütün detalları və şəkilləri ilə birlikdə yoxlanışa göndərildi.");
        closeWizard();
    }
</script>

</body>
</html>
