<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto Dünya | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ca1016; --bg: #121212; --card: #1d1d1d; --text: #a5a5a5; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; padding-bottom: 100px; }
        
        /* Progress Bar */
        .progress-container { position: fixed; top: 0; width: 100%; height: 4px; background: #333; z-index: 5000; display: none; }
        #progressBar { height: 100%; width: 0%; background: var(--red); transition: 0.3s; }

        /* Header */
        header { background: var(--bg); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--red); font-weight: bold; font-size: 1.5rem; text-decoration: none; text-transform: uppercase; }

        /* Yekəldilmiş Üst Filterlər */
        .quick-filters { display: flex; gap: 12px; padding: 15px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .quick-filters::-webkit-scrollbar { display: none; }
        .filter-pill { background: #222; color: white; padding: 12px 22px; border-radius: 25px; font-size: 15px; border: 1px solid #333; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .filter-pill.active { background: white; color: black; font-weight: bold; }
        .filter-pill:active { transform: scale(0.95); }

        /* Filter və Tarix Düymələri */
        .action-row { display: flex; gap: 10px; padding: 0 15px 15px; }
        .action-btn { flex: 1; background: var(--card); color: white; border: 1px solid #333; padding: 12px; border-radius: 10px; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-btn i { color: var(--red); }

        /* Kartlar */
        .car-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .car-card { background: var(--card); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #222; }
        .car-card img { width: 100%; height: 120px; object-fit: cover; }
        .car-info { padding: 10px; }
        .car-price { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .car-meta { font-size: 0.8rem; color: var(--text); }

        /* Addım-Addım Elan Paneli */
        .step-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 4000; }
        .active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .step-header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .back-btn { font-size: 1.5rem; margin-right: 20px; color: var(--text); border: none; background: none; }
        
        .list-item { background: var(--card); padding: 18px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .footer-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--red); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; }

        /* Alt Menyu */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #181818; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--text); text-align: center; text-decoration: none; font-size: 11px; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: var(--red); }

        /* Dairəvi "+" Düyməsi */
        .plus-btn-wrap { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1001; }
        .plus-btn { background: var(--red); color: white; border: none; width: 65px; height: 65px; border-radius: 50%; font-size: 30px; box-shadow: 0 4px 15px rgba(202,16,22,0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="progress-container" id="pCont"><div id="progressBar"></div></div>

<header id="mainHead">
    <a href="#" class="logo">AVTO DÜNYA</a>
    <i class="fa-regular fa-bell"></i>
</header>

<div id="mainContent">
    <div class="quick-filters">
        <div class="filter-pill active">Hamısı</div>
        <div class="filter-pill"><i class="fa-solid fa-percent"></i> Kredit</div>
        <div class="filter-pill"><i class="fa-solid fa-arrows-rotate"></i> Barter</div>
        <div class="filter-pill">Ehtiyat hissələri</div>
    </div>

    <div class="action-row">
        <div class="action-btn"><i class="fa-solid fa-sliders"></i> Filtrlər</div>
        <div class="action-btn"><i class="fa-solid fa-arrow-down-wide-short"></i> Tarixə görə</div>
    </div>

    <div class="car-container">
        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=400">
            <div class="car-info">
                <div class="car-price">35 500 AZN</div>
                <div class="car-model">Mercedes E-Class</div>
                <div class="car-meta">2014, 2.2 L, Bakı</div>
            </div>
        </div>
    </div>
</div>

<div id="step1" class="step-page">
    <div class="step-header"><button class="back-btn" onclick="closeWizard()">×</button> <h2>Kateqoriya</h2></div>
    <div class="list-item" onclick="goNext(2)"><span><i class="fa-solid fa-car"></i> Minik Maşınları</span></div>
    <div class="list-item" onclick="goNext(2)"><span><i class="fa-solid fa-truck"></i> Kommersiya</span></div>
</div>

<div id="step2" class="step-page">
    <div class="step-header"><button class="back-btn" onclick="goBack(1)">←</button> <h2>Marka</h2></div>
    <div class="list-item" onclick="goNext(3)">Mercedes</div>
    <div class="list-item" onclick="goNext(3)">BMW</div>
    <div class="list-item" onclick="goNext(3)">LADA</div>
</div>

<div id="step3" class="step-page">
    <div class="step-header"><button class="back-btn" onclick="goBack(2)">←</button> <h2>Buraxılış ili</h2></div>
    <div id="yearList"></div>
</div>

<div id="step4" class="step-page">
    <div class="step-header"><button class="back-btn" onclick="goBack(3)">←</button> <h2>Şəkillər (Maks 41)</h2></div>
    <div style="text-align: center; padding: 40px; border: 2px dashed #333; border-radius: 15px;" onclick="document.getElementById('fileInp').click()">
        <i class="fa-solid fa-camera" style="font-size: 3rem; color: var(--red);"></i>
        <p>Şəkil seçmək üçün toxunun</p>
    </div>
    <input type="file" id="fileInp" hidden multiple accept="image/*" onchange="updatePhotoCount()">
    <div id="photoStatus" style="margin-top: 20px; text-align: center;"></div>
    <button class="footer-btn" onclick="finish()">ELANI PAYLAŞ</button>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i><span>Əsas</span></a>
    <a href="#" class="nav-item"><i class="fa-regular fa-heart"></i><span>Seçilmişlər</span></a>
    <div style="width: 70px;"></div>
    <a href="#" class="nav-item"><i class="fa-regular fa-comment"></i><span>Mesajlar</span></a>
    <a href="#" class="nav-item"><i class="fa-regular fa-user"></i><span>Kabinet</span></a>
</nav>

<div class="plus-btn-wrap">
    <button class="plus-btn" onclick="startWizard()"><i class="fa-solid fa-plus"></i></button>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 4;

    // İl siyahısı (1950-2026)
    const yList = document.getElementById('yearList');
    for (let i = 2026; i >= 1950; i--) {
        let div = document.createElement('div');
        div.className = 'list-item';
        div.innerText = i;
        div.onclick = () => goNext(4);
        yList.appendChild(div);
    }

    function startWizard() {
        document.getElementById('step1').classList.add('active');
        document.getElementById('pCont').style.display = 'block';
        updateProgress();
    }

    function closeWizard() {
        document.querySelectorAll('.step-page').forEach(s => s.classList.remove('active'));
        document.getElementById('pCont').style.display = 'none';
        currentStep = 1;
    }

    function goNext(step) {
        document.getElementById('step' + currentStep).classList.remove('active');
        currentStep = step;
        document.getElementById('step' + currentStep).classList.add('active');
        updateProgress();
    }

    function goBack(step) {
        document.getElementById('step' + currentStep).classList.remove('active');
        currentStep = step;
        document.getElementById('step' + currentStep).classList.add('active');
        updateProgress();
    }

    function updateProgress() {
        let percent = ((currentStep - 1) / (totalSteps - 1)) * 100;
        document.getElementById('progressBar').style.width = percent + "%";
    }

    function updatePhotoCount() {
        const count = document.getElementById('fileInp').files.length;
        document.getElementById('photoStatus').innerText = count + " şəkil seçildi.";
    }

    function finish() {
        document.body.innerHTML = `
            <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: #121212; color: white; padding: 20px;">
                <i class="fa-solid fa-circle-check" style="font-size: 5rem; color: #ca1016; margin-bottom: 20px;"></i>
                <h1 style="font-size: 1.8rem;">Elanınız yoxlamada</h1>
                <p style="color: #a5a5a5; margin-top: 10px;">Ekoş bəy tərəfindən yoxlanıldıqdan sonra saytda görünəcək.</p>
                <button onclick="location.reload()" style="margin-top: 30px; background: #ca1016; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold;">Ana səhifəyə qayıt</button>
            </div>
        `;
    }
</script>

</body>
    </html>
